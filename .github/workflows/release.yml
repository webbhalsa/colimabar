name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0) — required when triggering manually'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release, ad-hoc signed)
        run: |
          xcodebuild -project ColimaBar.xcodeproj -scheme ColimaBar \
            -configuration Release -derivedDataPath ./build \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.version }}" \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="-" DEVELOPMENT_TEAM="" \
            clean build

      - name: Package .app into .zip
        id: package
        run: |
          cd build/Build/Products/Release
          ZIP="ColimaBar-${{ steps.version.outputs.version }}.zip"
          ditto -c -k --keepParent ColimaBar.app "$ZIP"
          SHA=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "zip_path=build/Build/Products/Release/$ZIP" >> "$GITHUB_OUTPUT"
          echo "Artifact:  $ZIP"
          echo "sha256:    $SHA"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ColimaBar ${{ steps.version.outputs.version }}
          files: ${{ steps.package.outputs.zip_path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            Ad-hoc signed macOS build. On first launch, right-click the app in Finder and choose Open to bypass Gatekeeper.

            **Install via Homebrew:**
            ```
            brew install --cask webbhalsa/tap/colimabar
            ```

      - name: Bump homebrew-tap cask
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.package.outputs.sha256 }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_GITHUB_TOKEN not set — skipping tap bump. Add the secret in repo settings to enable auto-publishing."
            exit 0
          fi

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/webbhalsa/homebrew-tap.git" tap
          sed \
            -e "s|__VERSION__|${VERSION}|g" \
            -e "s|__SHA256__|${SHA256}|g" \
            .github/cask.template.rb > tap/colimabar.rb

          cd tap
          if git diff --quiet colimabar.rb; then
            echo "No changes to colimabar.rb; skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add colimabar.rb
          git commit -m "Bump colimabar to ${VERSION}"
          git push origin HEAD
